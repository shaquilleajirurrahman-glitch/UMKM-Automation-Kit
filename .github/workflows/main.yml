name: UMKM Growth Kit - Scheduled Scraper

on:
  schedule:
    # Sengaja TIDAK di angka bulat (xx:00) -- jadwal tepat di awal jam adalah
    # waktu beban tertinggi di seluruh infrastruktur GitHub Actions (banyak
    # repo lain di dunia juga menjadwalkan di jam bulat yang sama), sehingga
    # rawan delay parah atau ter-skip. GitHub merekomendasikan offset beberapa
    # menit untuk menghindari ini. 07:00 UTC = 17:07 WIB.
    - cron: '7 10 * * *'
  workflow_dispatch:
    # Tombol "Run workflow" manual di tab Actions -- penting untuk testing
    # sekarang juga, tanpa harus menunggu jadwal cron besok jam 17:07 WIB

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write credentials.json from secret
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: printf '%s' "$GOOGLE_CREDENTIALS_JSON" > credentials.json

      - name: Run pipeline
        run: python main_pipeline.py

      - name: Clean up credentials
        if: always()
        run: rm -f credentials.json